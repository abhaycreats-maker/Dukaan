<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesiCart 🛒</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
    margin:0;
    font-family:Poppins;
    background:#f5f5f5;
}

/* HEADER */
header {
    background: linear-gradient(90deg,#ff9933,#138808);
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* PRODUCTS */
.products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    border-radius:10px;
    padding:10px;
    transition:.3s;
}

.card:hover {
    transform:scale(1.03);
}

.card img {
    width:100%;
    border-radius:10px;
}

/* BUTTON */
button {
    background:#ff6a00;
    border:none;
    padding:10px;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

/* MODALS */
.modal {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

.modal-content {
    background:white;
    padding:20px;
    width:350px;
    margin:10% auto;
    border-radius:10px;
}

/* IMAGE GALLERY */
.gallery img {
    width:60px;
    margin:5px;
    cursor:pointer;
}

input,textarea {
    width:100%;
    padding:10px;
    margin:10px 0;
}
</style>
</head>

<body>

<header>
<h2>DesiCart 🇮🇳</h2>
<button onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
</header>

<div class="products" id="products"></div>

<!-- PRODUCT DETAIL -->
<div class="modal" id="detailModal">
<div class="modal-content">
    <img id="mainImg" width="100%">
    <div class="gallery" id="gallery"></div>

    <h3 id="pName"></h3>
    <p id="pPrice"></p>

    <button onclick="addToCartDetail()">Add to Cart</button>
    <button onclick="closeModal('detailModal')">Close</button>
</div>
</div>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="modal-content">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3>Total: ₹<span id="total"></span></h3>

    <button onclick="openCheckout()">Checkout</button>
    <button onclick="closeModal('cartModal')">Close</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="modal-content">
    <h2>Checkout</h2>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <textarea id="address" placeholder="Address"></textarea>

    <button onclick="placeOrder()">Place Order</button>
    <button onclick="backToCart()">Back</button>
</div>
</div>

<script>

/* EMAILJS INIT */
(function(){
    emailjs.init("YOUR_PUBLIC_KEY");
})();

/* PRODUCTS */
const products = [
{
name:"Premium Watch",
price:5000,
images:[
"https://images.unsplash.com/photo-1523275335684-37898b6baf30",
"https://images.unsplash.com/photo-1519741497674-611481863552"
]
},
{
name:"Shoes",
price:3000,
images:[
"https://images.unsplash.com/photo-1542291026-7eec264c27ff",
"https://images.unsplash.com/photo-1528701800489-20be3c4c8b4b"
]
}
];

let cart=[];
let currentProduct=null;

/* RENDER PRODUCTS */
function render(){
    const container=document.getElementById("products");
    container.innerHTML="";

    products.forEach((p,i)=>{
        container.innerHTML+=`
        <div class="card">
            <img src="${p.images[0]}" onclick="openDetail(${i})">
            <h3>${p.name}</h3>
            <p>₹${p.price}</p>
            <button onclick="addToCart(${i})">Add to Cart</button>
        </div>`;
    });
}

/* DETAIL PAGE */
function openDetail(i){
    currentProduct=products[i];
    document.getElementById("detailModal").style.display="block";

    document.getElementById("mainImg").src=currentProduct.images[0];
    document.getElementById("pName").innerText=currentProduct.name;
    document.getElementById("pPrice").innerText="₹"+currentProduct.price;

    let gallery="";
    currentProduct.images.forEach(img=>{
        gallery+=`<img src="${img}" onclick="changeImg('${img}')">`;
    });
    document.getElementById("gallery").innerHTML=gallery;
}

function changeImg(src){
    document.getElementById("mainImg").src=src;
}

/* CART */
function addToCart(i){
    cart.push(products[i]);
    updateCart();
}

function addToCartDetail(){
    cart.push(currentProduct);
    updateCart();
}

function updateCart(){
    document.getElementById("cartCount").innerText=cart.length;
}

/* CART PAGE */
function openCart(){
    document.getElementById("cartModal").style.display="block";

    let html="";
    let total=0;

    cart.forEach((item,i)=>{
        total+=item.price;
        html+=`${item.name} ₹${item.price} 
        <button onclick="removeItem(${i})">X</button><br>`;
    });

    document.getElementById("cartItems").innerHTML=html;
    document.getElementById("total").innerText=total;
}

function removeItem(i){
    cart.splice(i,1);
    openCart();
    updateCart();
}

/* CHECKOUT */
function openCheckout(){
    closeModal('cartModal');
    document.getElementById("checkoutModal").style.display="block";
}

function backToCart(){
    closeModal('checkoutModal');
    openCart();
}

/* PLACE ORDER */
function placeOrder(){

    const name=document.getElementById("name").value;
    const email=document.getElementById("email").value;
    const address=document.getElementById("address").value;

    const params={
        name:name,
        email:email,
        address:address,
        order: JSON.stringify(cart)
    };

    emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",params)
    .then(()=>{
        alert("Order placed successfully!");
        cart=[];
        location.reload();
    })
    .catch(()=>{
        alert("Email setup required!");
    });
}

/* CLOSE MODAL */
function closeModal(id){
    document.getElementById(id).style.display="none";
}

render();
</script>

</body>
</html>
