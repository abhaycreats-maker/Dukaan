<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DesiCart Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
}

/* HERO WITH MADHUBANI PATTERN */
.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
}

/* MADHUBANI STYLE PATTERN */
.hero::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:
radial-gradient(circle,#ff9933 2px,transparent 2px),
radial-gradient(circle,#138808 2px,transparent 2px);
background-size:40px 40px;
opacity:0.15;
animation: movePattern 20s linear infinite;
}

@keyframes movePattern{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

.hero h1{
font-size:55px;
font-family:'Playfair Display',serif;
z-index:1;
}

.hero p{
z-index:1;
opacity:0.8;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
z-index:10;
}

.cart-btn{
background:linear-gradient(45deg,#d4af37,#f5d76e);
color:black;
padding:10px 20px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

/* PRODUCTS */
.products{
padding:100px 30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
border-radius:15px;
}

/* BUTTON */
button{
background:linear-gradient(45deg,#d4af37,#f5d76e);
color:black;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:.3s;
font-weight:600;
}

button:hover{
transform:translateY(-3px);
}

/* ADDED STATE */
button.added{
background:gray;
color:white;
cursor:not-allowed;
}

/* MODAL */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.modal-content{
background:#111;
padding:25px;
width:350px;
margin:10% auto;
border-radius:20px;
}

/* INPUT */
input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:none;
}

/* CART ITEMS */
.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

</style>
</head>

<body>

<header>
<h3>DesiCart 🇮🇳</h3>
<div class="cart-btn" onclick="openCart()">Cart (<span id="count">0</span>)</div>
</header>

<section class="hero">
<h1>Luxury Indian Store</h1>
<p>Art • Culture • Premium Shopping</p>
</section>

<section class="products" id="products"></section>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="modal-content">
<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="openCheckout()">Checkout</button>
<button onclick="closeModal('cartModal')">Close</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="modal-content">
<h2>Checkout</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
<button onclick="backCart()">Back</button>
</div>
</div>

<script>

const products=[
{name:"Royal Watch",price:5000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30"},
{name:"Premium Shoes",price:3000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{name:"Designer Bag",price:2000,img:"https://images.unsplash.com/photo-1548036328-c9fa89d128fa"}
];

let cart=[];

/* RENDER PRODUCTS */
function render(){
let html="";
products.forEach((p,i)=>{
const inCart = cart.find(item=>item.name===p.name);

html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button 
onclick="add(${i}, this)"
${inCart ? 'disabled' : ''}
class="${inCart ? 'added':''}"
>
${inCart ? 'Added':'Add to Cart'}
</button>

</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* ADD TO CART */
function add(i,btn){
cart.push(products[i]);

btn.innerText="Added";
btn.classList.add("added");
btn.disabled=true;

update();
}

/* UPDATE COUNT */
function update(){
document.getElementById("count").innerText=cart.length;
}

/* OPEN CART (FIXED) */
function openCart(){
document.getElementById("cartModal").style.display="block";
renderCart();
}

/* RENDER CART */
function renderCart(){
let html="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price;

html+=`
<div class="cart-item">
<span>${item.name}</span>
<span>₹${item.price}</span>
<button onclick="removeItem(${i})">X</button>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* REMOVE */
function removeItem(i){
cart.splice(i,1);
renderCart();
render();
update();
}

/* CHECKOUT */
function openCheckout(){
closeModal('cartModal');
document.getElementById("checkoutModal").style.display="block";
}

function backCart(){
closeModal('checkoutModal');
openCart();
}

/* PLACE ORDER */
function placeOrder(){
const name=document.getElementById("name").value;

if(!name){
alert("Please fill details");
return;
}

alert("Order placed successfully 🎉");
cart=[];
location.reload();
}

/* CLOSE */
function closeModal(id){
document.getElementById(id).style.display="none";
}

render();

</script>

</body>
</html>
