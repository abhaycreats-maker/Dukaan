<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
  font-family:'Playfair Display';
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
  url('https://images.unsplash.com/photo-1604147706283-2b3c2b1c1b75');
  background-size:cover;
}
.hero h1{font-size:40px;}

/* CART */
.cart-box{
  position:fixed;
  right:20px;
  top:20px;
  background:#0008;
  padding:10px;
  border-radius:10px;
}

/* BUTTON FIX */
.checkout-btn{
  position:fixed;
  right:20px;
  top:70px;
  z-index:10;
  padding:12px;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#fff1;
  border-radius:15px;
  padding:10px;
  cursor:pointer;
}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.3s;
}
.card img:hover{
  transform:scale(1.1);
}

button{
  background:linear-gradient(45deg,#ff6a00,#ee0979);
  border:none;
  padding:8px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button.disabled{
  background:gray;
  cursor:not-allowed;
}

/* CART PAGE */
.cart-page{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  display:none;
}

/* MODALS */
.modal{
  position:fixed;
  inset:0;
  background:#000c;
  display:none;
  justify-content:center;
  align-items:center;
}
.box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:320px;
}

/* SLIDER */
.slider img{
  width:100%;
  height:200px;
  object-fit:cover;
}

</style>
</head>

<body>

<div class="hero">
<h1>Luxury Indian Store ✨</h1>
<p>Premium cultural products</p>
</div>

<div class="cart-box">Cart: <span id="count">0</span></div>
<button class="checkout-btn" onclick="openCart()">Cart</button>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart-page" id="cartPage">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="openCheckout()">Checkout</button>
<button onclick="closeCart()">Close</button>
</div>

<!-- PRODUCT DETAIL -->
<div class="modal" id="detailModal">
<div class="box">
<img id="detailImg">
<h3 id="detailName"></h3>
<p id="detailPrice"></p>
<button onclick="closeDetail()">Close</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="box">
<h3>Checkout</h3>
<div id="summary"></div>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<textarea id="address" placeholder="Address"></textarea>
<button onclick="placeOrder()">Place Order</button>
<button onclick="backToCart()">Back</button>
</div>
</div>

<!-- SUCCESS -->
<div class="modal" id="successModal">
<div class="box">
<h2>Order Placed ✅</h2>
<p id="orderText"></p>
<button onclick="goHome()">Home</button>
</div>
</div>

<script>
emailjs.init("YOUR_PUBLIC_KEY");

const products=[
{
name:"Watch",
price:5000,
imgs:[
"https://images.unsplash.com/photo-1523275335684-37898b6baf30",
"https://images.unsplash.com/photo-1518544801976-3e159e50e5bb",
"https://images.unsplash.com/photo-1508057198894-247b23fe5ade"
]
},
{
name:"Shoes",
price:3000,
imgs:[
"https://images.unsplash.com/photo-1542291026-7eec264c27ff",
"https://images.unsplash.com/photo-1600180758890-6b94519a8ba3"
]
}
];

let cart=[];

/* RENDER */
function render(){
const el=document.getElementById("products");
el.innerHTML="";

products.forEach((p,i)=>{
const added=cart.find(x=>x.name===p.name);

el.innerHTML+=`
<div class="card" onclick="openDetail(${i})">
<img src="${p.imgs[0]}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button class="${added?'disabled':''}" onclick="event.stopPropagation();add(${i})">
${added?'Added':'Add to Cart'}
</button>
</div>`;
});
}

/* CART */
function add(i){
if(cart.find(x=>x.name===products[i].name)) return;
cart.push(products[i]);
updateCart();
render();
}

function remove(i){
cart.splice(i,1);
updateCart();
render();
}

function updateCart(){
document.getElementById("count").innerText=cart.length;

let html="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price;
html+=`<p>${item.name} ₹${item.price}
<button onclick="remove(${i})">X</button></p>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

/* CART UI */
function openCart(){
document.getElementById("cartPage").style.display="block";
}
function closeCart(){
document.getElementById("cartPage").style.display="none";
}

/* DETAIL */
function openDetail(i){
document.getElementById("detailModal").style.display="flex";
document.getElementById("detailImg").src=products[i].imgs[0];
document.getElementById("detailName").innerText=products[i].name;
document.getElementById("detailPrice").innerText="₹"+products[i].price;
}
function closeDetail(){
document.getElementById("detailModal").style.display="none";
}

/* CHECKOUT */
function openCheckout(){
if(cart.length===0) return alert("Cart empty");
let html="";
let total=0;

cart.forEach(p=>{
total+=p.price;
html+=`<p>${p.name} ₹${p.price}</p>`;
});

html+=`<h3>Total ₹${total}</h3>`;

document.getElementById("summary").innerHTML=html;
document.getElementById("checkoutModal").style.display="flex";
closeCart();
}

function backToCart(){
document.getElementById("checkoutModal").style.display="none";
openCart();
}

/* ORDER */
function placeOrder(){
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let address=document.getElementById("address").value;

if(!name||!email||!address) return alert("Fill all");

let total=cart.reduce((a,b)=>a+b.price,0);

document.getElementById("orderText").innerText=
`Name: ${name} | Total ₹${total}`;

document.getElementById("checkoutModal").style.display="none";
document.getElementById("successModal").style.display="flex";

cart=[];
updateCart();
render();
}

function goHome(){
document.getElementById("successModal").style.display="none";
}

render();
</script>

</body>
</html>
