<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    color: white;
}

/* HERO */
.hero {
    padding: 60px 20px;
    text-align: center;
    background: radial-gradient(circle at top, #ff9933, #138808, #000080);
    font-family: 'Playfair Display', serif;
    animation: fadeIn 1.5s ease;
}

.hero h1 {
    font-size: 40px;
    letter-spacing: 2px;
}

/* LAYOUT */
.container {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 20px;
    padding: 20px;
}

/* SIDEBAR */
.sidebar {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 15px;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
}

/* IMAGE */
.card img {
    width: 100%;
    border-radius: 15px;
    transition: 0.3s;
}
.card img:hover {
    transform: scale(1.1);
}

/* BUTTON */
button {
    background: linear-gradient(45deg, #ff6a00, #ee0979);
    border: none;
    padding: 10px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    transform: translateY(-3px);
}

/* DISABLED BUTTON */
button.added {
    background: gray;
    cursor: not-allowed;
}

/* CART PANEL */
.cartPanel {
    position: fixed;
    right: 20px;
    top: 20px;
    background: black;
    padding: 15px;
    border-radius: 10px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #111;
    padding: 20px;
    width: 350px;
    margin: 8% auto;
    border-radius: 15px;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1;}
}
</style>
</head>

<body>

<div class="hero">
    <h1>Luxury Store ✨</h1>
    <p>Premium Indian Aesthetic Experience</p>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Filters</h3>
        <button onclick="filterProducts('all')">All</button>
        <button onclick="filterProducts('premium')">Premium</button>
        <button onclick="filterProducts('budget')">Budget</button>

        <hr>

        <button onclick="openCart()">View Cart 🛒</button>
    </div>

    <!-- PRODUCTS -->
    <div class="products" id="productList"></div>

</div>

<!-- CART PAGE -->
<div class="modal" id="cartModal">
<div class="modal-content">
    <h2>Cart</h2>
    <div id="cartItems"></div>
    <h3>Total: ₹<span id="totalPrice">0</span></h3>

    <button onclick="openCheckout()">Checkout</button>
    <button onclick="closeCart()">Back</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="modal-content">
    <h2>Checkout</h2>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <textarea id="address" placeholder="Address"></textarea>

    <button onclick="placeOrder()">Place Order</button>
    <button onclick="backToCart()">Back</button>
</div>
</div>

<script>
const products = [
{
name:"Premium Watch",
price:5000,
type:"premium",
images:[
"https://images.unsplash.com/photo-1523275335684-37898b6baf30",
"https://images.unsplash.com/photo-1519741497674-611481863552"
]
},
{
name:"Luxury Shoes",
price:3000,
type:"premium",
images:[
"https://images.unsplash.com/photo-1542291026-7eec264c27ff",
"https://images.unsplash.com/photo-1528701800489-20be3c4c8b4b"
]
},
{
name:"Casual Shirt",
price:800,
type:"budget",
images:[
"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab",
"https://images.unsplash.com/photo-1596755389378-c31d21fd1273"
]
},
{
name:"Stylish Bag",
price:1200,
type:"budget",
images:[
"https://images.unsplash.com/photo-1548036328-c9fa89d128fa",
"https://images.unsplash.com/photo-1593032465175-481ac7f401a0"
]
}
];

let cart = [];

function renderProducts(list){
    const container = document.getElementById("productList");
    container.innerHTML="";

    list.forEach((p,i)=>{
        const inCart = cart.find(item => item.name === p.name);

        container.innerHTML += `
        <div class="card">
            <img src="${p.images[0]}" onclick="openDetail(${i})">
            <h3>${p.name}</h3>
            <p>₹${p.price}</p>

            <button 
                class="${inCart ? 'added' : ''}" 
                onclick="addToCart(${i}, this)"
                ${inCart ? 'disabled' : ''}
            >
                ${inCart ? 'Added' : 'Add to Cart'}
            </button>
        </div>`;
    });
}

function addToCart(i, btn){
    cart.push(products[i]);
    btn.innerText="Added";
    btn.classList.add("added");
    btn.disabled=true;
}

/* CART */
function openCart(){
    document.getElementById("cartModal").style.display="block";
    renderCart();
}

function closeCart(){
    document.getElementById("cartModal").style.display="none";
}

function renderCart(){
    const container=document.getElementById("cartItems");
    container.innerHTML="";
    let total=0;

    cart.forEach((item,index)=>{
        total+=item.price;
        container.innerHTML+=`
        <p>${item.name} - ₹${item.price} 
        <button onclick="removeItem(${index})">X</button></p>`;
    });

    document.getElementById("totalPrice").innerText=total;
}

function removeItem(i){
    cart.splice(i,1);
    renderCart();
    renderProducts(products);
}

/* CHECKOUT */
function openCheckout(){
    document.getElementById("cartModal").style.display="none";
    document.getElementById("checkoutModal").style.display="block";
}

function backToCart(){
    document.getElementById("checkoutModal").style.display="none";
    document.getElementById("cartModal").style.display="block";
}

function placeOrder(){
    alert("Order Placed Successfully 🚀");
    cart=[];
    location.reload();
}

/* PRODUCT DETAIL */
function openDetail(i){
    alert("Product Page with multiple images coming next upgrade 🚀");
}

/* FILTER */
function filterProducts(type){
    if(type==='all') return renderProducts(products);
    renderProducts(products.filter(p=>p.type===type));
}

renderProducts(products);
</script>

</body>
</html>
