<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DesiCart Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

/* RESET */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* HERO (Madhubani Inspired) */
.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1604335399105-a0c585fd81a1');
background-size:cover;
background-position:center;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background: radial-gradient(circle, rgba(255,153,51,0.3), transparent);
animation: pulse 6s infinite;
}

.hero h1{
font-size:60px;
font-family:'Playfair Display',serif;
letter-spacing:3px;
animation: fadeUp 1s ease;
}

.hero p{
opacity:0.8;
animation: fadeUp 1.5s ease;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(15px);
z-index:10;
}

.cart-btn{
background:linear-gradient(45deg,#ff6a00,#ee0979);
padding:10px 20px;
border-radius:30px;
cursor:pointer;
}

/* PRODUCTS */
.products{
padding:100px 30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
transition:.4s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
}

.card img{
width:100%;
border-radius:15px;
transition:.4s;
}

.card:hover img{
transform:scale(1.1);
}

/* BUTTON */
button{
background:linear-gradient(45deg,#ff6a00,#ee0979);
border:none;
padding:12px;
color:white;
border-radius:10px;
cursor:pointer;
transition:.3s;
width:100%;
}

button:hover{
transform:translateY(-3px);
}

/* MODAL */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
}

.modal-content{
background:#111;
padding:25px;
width:350px;
margin:10% auto;
border-radius:20px;
animation: fadeUp .5s;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

/* ANIMATIONS */
@keyframes fadeUp{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes pulse{
0%{opacity:.2}
50%{opacity:.6}
100%{opacity:.2}
}

</style>
</head>

<body>

<header>
<h3>DesiCart 🇮🇳</h3>
<div class="cart-btn" onclick="openCart()">Cart (<span id="count">0</span>)</div>
</header>

<section class="hero">
<h1>Luxury Indian Store</h1>
<p>Experience Premium Shopping with Indian Art</p>
</section>

<section class="products" id="products"></section>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="modal-content">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: ₹<span id="total"></span></h3>

<button onclick="openCheckout()">Checkout</button>
<button onclick="closeModal('cartModal')">Close</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="modal-content">
<h2>Checkout</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
<button onclick="backCart()">Back</button>
</div>
</div>

<script>

const products=[
{
name:"Royal Watch",
price:5000,
img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30"
},
{
name:"Premium Shoes",
price:3000,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"
},
{
name:"Designer Bag",
price:2000,
img:"https://images.unsplash.com/photo-1548036328-c9fa89d128fa"
}
];

let cart=[];

/* RENDER */
function render(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="add(${i})">Add to Cart</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* CART */
function add(i){
cart.push(products[i]);
update();
}

function update(){
document.getElementById("count").innerText=cart.length;
}

function openCart(){
document.getElementById("cartModal").style.display="block";

let html="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price;
html+=`${item.name} ₹${item.price} 
<button onclick="remove(${i})">X</button><br>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function remove(i){
cart.splice(i,1);
openCart();
update();
}

/* CHECKOUT */
function openCheckout(){
closeModal('cartModal');
document.getElementById("checkoutModal").style.display="block";
}

function backCart(){
closeModal('checkoutModal');
openCart();
}

function placeOrder(){
alert("Order Placed 🚀");
cart=[];
location.reload();
}

function closeModal(id){
document.getElementById(id).style.display="none";
}

render();

</script>

</body>
</html>
