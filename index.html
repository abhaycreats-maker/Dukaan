<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f2027;
  color:white;
  overflow-x:hidden;
}

/* Animated Indian pattern */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:url('https://www.transparenttextures.com/patterns/arabesque.png');
  opacity:0.07;
  animation:move 50s linear infinite;
  z-index:-1;
}
@keyframes move{
  from{transform:translate(0,0);}
  to{transform:translate(300px,300px);}
}

.hero{
  text-align:center;
  padding:60px 20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#ffffff10;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
}
.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

button{
  background:linear-gradient(45deg,#ff6a00,#ee0979);
  border:none;
  padding:8px 12px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000a;
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  background:#111;
  padding:20px;
  border-radius:12px;
  width:320px;
}

/* SLIDER */
.slider{
  position:relative;
}

.slider img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  transition:0.3s;
}
.slider img:hover{
  transform:scale(1.2);
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#0008;
  border:none;
  color:white;
  padding:5px 10px;
  cursor:pointer;
}
.prev{left:5px;}
.next{right:5px;}
</style>
</head>

<body>

<div class="hero">
<h1>Luxury Store</h1>
<p>Premium Indian Inspired UI</p>
</div>

<div class="products" id="products"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box" id="modalBox">
    <div class="slider">
      <button class="nav-btn prev" id="prevBtn">‹</button>
      <img id="slideImg">
      <button class="nav-btn next" id="nextBtn">›</button>
    </div>

    <h3 id="pname"></h3>
    <p id="pprice"></p>

    <button id="closeBtn">Close</button>
  </div>
</div>

<script>
const products = [
{
  name:"Watch",
  price:5000,
  imgs:[
    "https://images.unsplash.com/photo-1523275335684-37898b6baf30",
    "https://images.unsplash.com/photo-1518544801976-3e159e50e5bb",
    "https://images.unsplash.com/photo-1508057198894-247b23fe5ade"
  ]
}
];

let current = 0;
let images = [];
let sliderInterval = null;

const productsEl = document.getElementById("products");
const modal = document.getElementById("modal");
const modalBox = document.getElementById("modalBox");
const slideImg = document.getElementById("slideImg");

function renderProducts(){
  productsEl.innerHTML = "";

  products.forEach((p,i)=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.imgs[0]}" alt="">
      <div class="card-content">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button>Add to Cart</button>
      </div>
    `;

    card.addEventListener("click", ()=>{
      openProduct(i);
    });

    const btn = card.querySelector("button");
    btn.addEventListener("click",(e)=>{
      e.stopPropagation();
      alert("Added to cart");
    });

    productsEl.appendChild(card);
  });
}

function openProduct(i){
  images = products[i].imgs;
  current = 0;

  document.getElementById("pname").innerText = products[i].name;
  document.getElementById("pprice").innerText = "₹" + products[i].price;

  modal.style.display = "flex";

  updateSlide();
  startAutoSlide();
}

function updateSlide(){
  slideImg.src = images[current];
}

function next(){
  current = (current + 1) % images.length;
  updateSlide();
}

function prev(){
  current = (current - 1 + images.length) % images.length;
  updateSlide();
}

function startAutoSlide(){
  stopAutoSlide();
  sliderInterval = setInterval(next, 3000);
}

function stopAutoSlide(){
  if(sliderInterval){
    clearInterval(sliderInterval);
    sliderInterval = null;
  }
}

function closeModal(){
  modal.style.display = "none";
  stopAutoSlide();
}

/* EVENTS */
document.getElementById("nextBtn").addEventListener("click",(e)=>{
  e.stopPropagation();
  next();
});

document.getElementById("prevBtn").addEventListener("click",(e)=>{
  e.stopPropagation();
  prev();
});

document.getElementById("closeBtn").addEventListener("click",closeModal);

modal.addEventListener("click",closeModal);

modalBox.addEventListener("click",(e)=>{
  e.stopPropagation();
});

document.addEventListener("keydown",(e)=>{
  if(e.key === "Escape") closeModal();
});

/* INIT */
renderProducts();
</script>

</body>
</html>
