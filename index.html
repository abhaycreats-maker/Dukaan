<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DesiCart Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
}

/* HEADER FIXED */
header{
position:fixed;
top:0;
width:100%;
padding:12px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(15px);
z-index:1000;
}

/* BIGGER BRAND */
.logo{
font-size:28px;
font-family:'Playfair Display',serif;
font-weight:700;
letter-spacing:1px;
}

/* SMALL CART BUTTON */
.cart-btn{
background:linear-gradient(45deg,#d4af37,#f5d76e);
color:black;
padding:6px 14px;
border-radius:20px;
cursor:pointer;
font-size:14px;
font-weight:600;
transition:.3s;
z-index:1001;
}

.cart-btn:hover{
transform:scale(1.05);
}

/* HERO */
.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
position:relative;
overflow:hidden;
margin-top:60px;
}

.hero::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:
radial-gradient(circle,#ff9933 2px,transparent 2px),
radial-gradient(circle,#138808 2px,transparent 2px);
background-size:40px 40px;
opacity:0.15;
animation: movePattern 20s linear infinite;
}

@keyframes movePattern{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

.hero h1{
font-size:52px;
font-family:'Playfair Display',serif;
z-index:1;
}

/* PRODUCTS */
.products{
padding:40px 25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
padding:15px;
}

.card img{
width:100%;
border-radius:10px;
}

/* BUTTON */
button{
background:linear-gradient(45deg,#d4af37,#f5d76e);
color:black;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

button.added{
background:gray;
color:white;
cursor:not-allowed;
}

/* MODAL FIX */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
z-index:2000;
}

.modal-content{
background:#111;
padding:20px;
width:320px;
margin:12% auto;
border-radius:15px;
}

/* CART ITEM */
.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

</style>
</head>

<body>

<header>
<div class="logo">DesiCart 🇮🇳</div>
<div class="cart-btn" onclick="openCart()">🛒 <span id="count">0</span></div>
</header>

<section class="hero">
<h1>Luxury Indian Store</h1>
</section>

<section class="products" id="products"></section>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="modal-content">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="openCheckout()">Checkout</button>
<button onclick="closeModal('cartModal')">Close</button>
</div>
</div>

<script>

const products=[
{name:"Watch",price:5000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30"},
{name:"Shoes",price:3000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"}
];

let cart=[];

/* RENDER */
function render(){
let html="";
products.forEach((p,i)=>{
const inCart = cart.find(item=>item.name===p.name);

html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button 
onclick="add(${i}, this)"
${inCart?'disabled':''}
class="${inCart?'added':''}"
>
${inCart?'Added':'Add'}
</button>

</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* ADD */
function add(i,btn){
cart.push(products[i]);
btn.innerText="Added";
btn.classList.add("added");
btn.disabled=true;
update();
}

/* UPDATE */
function update(){
document.getElementById("count").innerText=cart.length;
}

/* CART FIXED */
function openCart(){
const modal = document.getElementById("cartModal");
modal.style.display="block";
renderCart();
}

/* RENDER CART */
function renderCart(){
let html="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price;
html+=`
<div class="cart-item">
<span>${item.name}</span>
<span>₹${item.price}</span>
<button onclick="removeItem(${i})">X</button>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* REMOVE */
function removeItem(i){
cart.splice(i,1);
renderCart();
render();
update();
}

/* CLOSE */
function closeModal(id){
document.getElementById(id).style.display="none";
}

render();

</script>

</body>
</html>
